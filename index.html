<style>

<script>
const cv=document.getElementById('gc'),cx=cv.getContext('2d');
const W=420,H=580;
cx.imageSmoothingEnabled=false;
const P=3;
function snap(n){return Math.round(n/P)*P;}
function pr(x,y,w,h,c){if(w<P||h<P)return;cx.fillStyle=c;cx.fillRect(snap(x),snap(y),snap(Math.max(P,w)),snap(Math.max(P,h)));}

let state='idle',fr=0,score=0,lives=3;
let bestScore=parseInt(localStorage.getItem('aerea51tw_best')||'0');
let ship,bullets,enemies,bossBullets,particles,stars,powerups;
let dragStart=null,touchMoved=false;
let spawnTimer=0,spawnIv=90;
let lemonBossActive=false,mambaActive=false,lemonBoss=null,mamba=null;
let shakeTimer=0,superMode=0;
// ── 自動射擊 ──────────────────────────────────────────────
let autoFireTimer=0;
const AUTO_FIRE_INTERVAL=18;
// ── P.O.S 系統 ────────────────────────────────────────────
let posKillCount=0, posReady=false, posActive=false, posTimer=0;
let autoFireOn=false;

function triggerPOS(){
  if(!posReady)return;
  posReady=false;posActive=true;posTimer=90;posKillCount=0;
  shakeTimer=12;
  enemies.forEach(e=>{
    spawnParticles(e.x,e.y,'#ff44ff',12);
    score+=(e.type==='snake'?25:12)*comboMult;
    addCombo();onEnemyKilled(e.type);
  });
  enemies=[];
  if(lemonBoss){lemonBoss.hp=Math.max(1,lemonBoss.hp-15);lemonBoss.hit=20;}
  if(mamba){mamba.hp=Math.max(1,mamba.hp-20);mamba.hit=20;}
}

// ── 今日挑戰系統 ─────────────────────────────────────────
const CHALLENGE_DAYS=[
  {id:'karina', name:"Karina's Challenge Day", emoji:'🥺',
   date:'事件日期：2025.05.29',
   body:`2025年5月29日，Karina 在活動上親口說出了「aespo」這個神奇的詞。\n現場所有人陷入沉默——\n「我們是 aespa，不是 aespo 啦！」（全場笑爛）\n直到今天，沒有人知道 aespo 是什麼。\n也許是外星語。`,
   hud:'aespo...aespo???', enemy:'aespo', bullet:'heart_blue'},
  {id:'giselle', name:"Giselle's Challenge Day", emoji:'🌸',
   date:'事件日期：2024.08.09',
   body:`演唱會進行中，一隻蜻蜓突然降落舞台。\nGiselle 當場尖叫、在舞台上狂奔，\n並宣告：「我想回家。」\n蜻蜓沒有離場，Giselle 繼續表演。\n這是她迄今最勇敢的一次(?)`,
   hud:'我想要回家～(怕', enemy:'dragonfly', bullet:'moon_yellow'},
  {id:'winter', name:"Winter's Challenge Day", emoji:'☃️',
   date:'事件日期：2024.10.20',
   body:`舞台乾冰效果全開的那一刻，\nWinter 的頭髮緩緩飄起。\n靜電選中了她。\n「拔絲冬冬」就此誕生，永載史冊。\n她說這叫氛圍感。我們說這叫天選之人。`,
   hud:'拔絲...冬冬??!!', enemy:'yam', bullet:'star_yellow'},
  {id:'ningning', name:"Ningning's Challenge Day", emoji:'🐯',
   date:'事件日期：2024.08.11',
   body:`演唱會安可環節，\n台下粉絲自發唱起應援曲，\naespa 四人靜靜聆聽了整整五分鐘。\n最後 Ningning 開口：\n「聽了大家五分鐘才聽出來⋯⋯\n感謝大家美麗的參與～」\n她說這是讚美。我們選擇相信她。`,
   hud:'感謝大家美麗的參與', enemy:'note', bullet:'butterfly_purple'},
  {id:'ae', name:'Be my æ Day', emoji:'❤️🧡💛💚💙🩵💜',
   date:'無特定事件',
   body:`ae 的力量滲透了今天。\n但沒關係——\naespa 四人一直都在，\nMY 也一直都在。\n\n我們在同一個宇宙裡，\n是彼此最珍貴的朋友。\n\n一起打倒黑曼巴吧 🖤`,
   hud:'Be / my / æ', enemy:'snake_only', bullet:'ae_text'},
  {id:'lemon', name:'Lemon Day~', emoji:'🍋',
   date:'無特定事件',
   body:`今天是 Lemonade 日。\n檸檬王的親戚們全員出動，\n大的小的圓的扁的，全部都是檸檬。\n沒有別的。就是檸檬。\n為什麼？因為今天是 Lemon Day。`,
   hud:'Lemon Day～🍋', enemy:'mini_lemon', bullet:'note_green'},
  {id:'kwangya', name:'Beat KWANGYA', emoji:'🏢',
   date:'一個月出現一次',
   body:`KWANGYA 今天開放入侵。\nSM 大樓的燈還亮著，\n合約還沒有到期，\n但你已經在這裡了。\n打倒大樓，帶她們回家。`,
   hud:'BEAT KWANGYA 🔥', enemy:'sm_building', bullet:'fire'},
];
const REST_DAY={id:'rest', name:'公休日', emoji:'📅👽'};

// Loop 排程（localStorage 存狀態）
let todayChallenge=null; // 今天的挑戰物件
let challengeMode=false; // 是否在今日挑戰模式

function getTodayChallenge(){
  // 用日期當種子決定今天的挑戰
  const now=new Date();
  const dayKey=`${now.getFullYear()}-${now.getMonth()}-${now.getDate()}`;
  const stored=localStorage.getItem('aerea51tw_loop');
  let loopData=stored?JSON.parse(stored):{loop:[],idx:0,lastDay:'',kwangyaMonth:-1};

  // 如果今天已計算過，直接返回
  if(loopData.lastDay===dayKey){
    const cid=loopData.loop[loopData.idx];
    if(cid==='rest') return REST_DAY;
    if(cid==='kwangya') return CHALLENGE_DAYS[6];
    return CHALLENGE_DAYS.find(d=>d.id===cid)||REST_DAY;
  }

  // 新的一天，推進 idx
  if(loopData.loop.length===0||loopData.idx>=loopData.loop.length-1){
    // 建立新 Loop（6主題日 + 1公休日，共7天）
    let pool=['karina','giselle','winter','ningning','ae','lemon'];
    // 洗牌
    for(let i=pool.length-1;i>0;i--){
      const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];
    }
    // 確保不跟上一個 loop 結尾重複
    if(loopData.loop.length>0){
      const lastItem=loopData.loop[loopData.loop.length-1];
      if(pool[0]===lastItem){const t=pool[0];pool[0]=pool[1];pool[1]=t;}
    }
    // 插入公休日（位置3）
    pool.splice(3,0,'rest');
    // Beat KWANGYA：本月已出現過就不插，否則取代公休日
    const thisMonth=now.getMonth();
    if(loopData.kwangyaMonth!==thisMonth){
      pool[3]='kwangya';
      loopData.kwangyaMonth=thisMonth;
    }
    loopData.loop=pool;
    loopData.idx=0;
  } else {
    loopData.idx++;
  }
  loopData.lastDay=dayKey;
  localStorage.setItem('aerea51tw_loop',JSON.stringify(loopData));

  const cid=loopData.loop[loopData.idx];
  if(cid==='rest') return REST_DAY;
  if(cid==='kwangya') return CHALLENGE_DAYS[6];
  return CHALLENGE_DAYS.find(d=>d.id===cid)||REST_DAY;
}

function getChallengeRecord(id){
  const v=localStorage.getItem('aerea51tw_ch_'+id);
  if(v===null) return null;       // 從未玩過
  return parseInt(v);              // 玩過（0表示玩過但0分）
}
function saveChallengeRecord(id,s){
  const cur=getChallengeRecord(id);
  if(cur===null||s>cur) localStorage.setItem('aerea51tw_ch_'+id,s);
}
let bulletLevel=0;
let bulletExp=0;
// LV0→LV1→...→LV9，共需升9次，每次需要的增強劑數量
const bulletExpNeeded=[3,3,4,4,4,4,5,5,5];
let sweepMode=0,sweepCount=0;
// ── 連殺系統 ─────────────────────────────────────────────
let combo=0;          // 目前連殺數
let comboTimer=0;     // 連殺保持時間（幀）
let comboMult=1;      // 目前倍率
let comboFlashMsg=''; // 顯示的連殺文字
let comboFlashTimer=0;
// ── 彩蛋系統 ─────────────────────────────────────────────
let eggScore51Done=false;
let killCount={heart:0,star:0,moon:0,butterfly:0};
let eggUnlocked={heart:false,star:false,moon:false,butterfly:false};
let eggAllCollected=false,eggFinalDone=false,eggFinalKills=0,eggAnyKillAfter=0;
let eggMsg='',eggMsgTimer=0,eggMsgColor='#00ffaa';
let eggFlash='',eggFlashTimer=0,eggFlashColor='#00ffaa';
let alienClickCount=0;
let secretModeActive=false,secretModeEverActive=false;
let topEdgeTimer=0,topEggDone=false;

function hud(){
  cx.fillStyle='rgba(0,0,10,0.88)';cx.fillRect(0,0,W,32);
  cx.font='bold 11px "Courier New"';
  // ── 子彈等級視覺圖示（10級）──
  const dispMap10=[
    {w:4, h:10,col:'#00ff88', count:1},           // LV0 小1
    {w:4, h:10,col:'#00ff88', count:3},           // LV1 小3
    {w:6, h:14,col:'#00ffcc', count:1},           // LV2 中1
    {w:6, h:14,col:'#00ffcc', count:3},           // LV3 中3
    {w:8, h:18,col:'#ffdd00', count:1},           // LV4 大1
    {w:8, h:18,col:'#ffdd00', count:3},           // LV5 大3
    {w:11,h:22,col:'#ff8800', count:1},           // LV6 巨1
    {w:11,h:22,col:'#ff8800', count:3},           // LV7 巨3
    {w:2, h:22,col:'#88aaff', count:1,laser:true},// LV8 雷射（細）
    {w:4, h:22,col:'#cc88ff', count:1,laser:true},// LV9 雷射（粗）MAX
  ];
  const lv=Math.min(bulletLevel,9);
  const bs=dispMap10[lv];
  let startX=5, iconY=27, gap=bs.w+2;
  for(let i=0;i<bs.count;i++){
    let bx=startX+i*(bs.w+gap);
    cx.fillStyle=bs.col;
    cx.fillRect(bx,iconY-bs.h,bs.w,bs.h);
    cx.fillStyle='#ffffff';
    cx.fillRect(bx,iconY-bs.h,bs.w>3?2:1,Math.round(bs.h*0.45));
  }
  if(bs.laser){
    cx.globalAlpha=0.22;cx.fillStyle=bs.col;
    for(let i=0;i<bs.count;i++){let bx=startX+i*(bs.w+gap);cx.fillRect(bx-2,iconY-bs.h-2,bs.w+4,bs.h+4);}
    cx.globalAlpha=1;
  }
  const lvCols10=['#00ff88','#00ff88','#00ffcc','#00ffcc','#ffdd00','#ffdd00','#ff8800','#ff8800','#ff44ff','#ff88ff'];
  let lc=lvCols10[lv];
  let barX=startX+bs.count*(bs.w+gap)+4, barY=6, barW=58, barH=6;
  cx.fillStyle='#112211'; cx.fillRect(barX,barY,barW,barH);
  if(lv<9){
    let pct=bulletExp/(bulletExpNeeded[lv]||5);
    cx.fillStyle=lc; cx.fillRect(barX,barY,Math.round(barW*pct),barH);
    cx.strokeStyle=lc; cx.lineWidth=1; cx.strokeRect(barX,barY,barW,barH);
  } else {
    cx.fillStyle=fr%20<10?'#ff88ff':'#ffccff'; cx.fillRect(barX,barY,barW,barH);
    cx.font='bold 7px "Courier New"';cx.fillStyle='#330033';cx.textAlign='center';
    cx.fillText('MAX',barX+barW/2,barY+5);cx.textAlign='left';cx.font='bold 11px "Courier New"';
  }
  cx.fillText('SCR:'+score,W/2-36,18);
  if(comboMult>1){
    let mc=['','','#ffff44','#ffaa00','#ff6600','#ff2200','#ff00ff'][Math.min(comboMult,6)];
    cx.fillStyle=mc||'#ff00ff';
    cx.fillText('×'+comboMult,W/2+38,18);
  }
  cx.fillStyle='#ff4488'; cx.fillText('HP:'+lives,W-54,18);
  if(sweepMode>0){
    cx.fillStyle='rgba(255,0,0,0.12)'; cx.fillRect(0,32,W,H-32);
    cx.font='bold 11px "Courier New"'; cx.fillStyle='#ff4444';
    cx.textAlign='center';
    cx.fillText('★ SUPER MODE — SWEEP ×'+sweepCount+' ★',W/2,H-8);
    cx.textAlign='left';
  } else if(superMode>0){
    cx.fillStyle='rgba(255,220,0,0.10)'; cx.fillRect(0,32,W,H-32);
    cx.font='bold 11px "Courier New"'; cx.fillStyle='#ffee00';
    cx.textAlign='center';
    cx.fillText('★ SUPER MODE '+(Math.ceil(superMode/60))+'s ★',W/2,H-8);
    cx.textAlign='left';
  }
  cx.font='bold 9px "Courier New"';
  if(challengeMode&&todayChallenge&&todayChallenge.hud){
    cx.fillStyle='#ffdd88';
    cx.textAlign='center';
    cx.fillText(todayChallenge.hud,W/2,H-20);
    cx.textAlign='left';
  } else {
    cx.fillStyle='#00cc66';
    cx.fillText('AEREA51TW',W/2-34,H-20);
  }
}

// ── IP 飛碟造型 ───────────────────────────────────────────
// 共用底盤
function drawCatDisk(x,y,glowCol){
  pr(x-30,y+8,60,6,'#223355');pr(x-32,y+10,64,5,'#2244aa');pr(x-28,y+13,56,4,'#1a2288');
  let lc=['#00ffff','#ffff00','#00ffff','#ff44ff','#00ffff'];
  for(let i=0;i<5;i++){pr(x-18+i*9,y+9,5,4,lc[i]);}
  pr(x-18,y+2,36,7,'#334466');pr(x-20,y+3,40,6,'#3355aa');
  let ef=fr%10<5;
  pr(x-3,y+17,6,ef?8:6,glowCol||'#00ff88');
  pr(x-2,y+17,4,ef?6:4,'#aaffcc');
  pr(x-1,y+17,2,ef?4:3,'#ffffff');
}
// 圓形身體
function drawCatBody(x,y,bodyCol,earCol,faceCol){
  for(let px2=-18;px2<=18;px2+=P)
    for(let py2=-18;py2<=18;py2+=P)
      if(px2*px2+py2*py2<=18*18){cx.fillStyle=bodyCol;cx.fillRect(snap(x+px2),snap(y+py2),P,P);}
  for(let px2=-11;px2<=11;px2+=P)
    for(let py2=-11;py2<=11;py2+=P)
      if(px2*px2*1.1+py2*py2<=11*11){cx.fillStyle=faceCol;cx.fillRect(snap(x+px2),snap(y+py2),P,P);}
  pr(x-18,y-14,8,8,earCol);pr(x-16,y-12,5,6,bodyCol);
  pr(x+10,y-14,8,8,earCol);pr(x+11,y-12,5,6,bodyCol);
}
// 統一表情：X眼 + 吐舌（顏色可自訂）
function drawXFace(x,y,eyeCol,noseCol,tongueCol){
  // 品紅眉毛
  pr(x-9,y-9,5,2,'#ff44aa');pr(x+4,y-9,5,2,'#ff44aa');
  // 左X眼
  pr(x-9,y-7,3,3,eyeCol);pr(x-7,y-5,3,3,eyeCol);
  pr(x-9,y-5,3,3,eyeCol);pr(x-7,y-7,3,3,eyeCol);
  // 右X眼
  pr(x+4,y-7,3,3,eyeCol);pr(x+6,y-5,3,3,eyeCol);
  pr(x+4,y-5,3,3,eyeCol);pr(x+6,y-7,3,3,eyeCol);
  // 腮紅（橢圓長條，眼睛外側下方）
  cx.fillStyle='#ffaabb';
  cx.beginPath();cx.ellipse(snap(x-8),snap(y+0),4,2,0,0,Math.PI*2);cx.fill();
  cx.beginPath();cx.ellipse(snap(x+8),snap(y+0),4,2,0,0,Math.PI*2);cx.fill();
  // 鼻
  pr(x-1,y,2,2,noseCol);
  // 嘴+舌
  pr(x-3,y+3,6,2,eyeCol);
  pr(x-1,y+4,2,4,tongueCol);
}

function drawCatIP(x,y,bodyCol,earCol,faceCol,eyeCol,noseCol,tongueCol,glowCol){
  drawCatDisk(x,y,glowCol);
  drawCatBody(x,y,bodyCol,earCol,faceCol);
  drawXFace(x,y,eyeCol,noseCol,tongueCol);
}

// 各成員IP（統一表情，顏色照娃娃）
function drawKarinaIP(x,y){
  // 藍灰色（圖一左一）
  drawCatIP(x,y,'#a8bcd4','#7a9bbf','#d8e8f8','#3a5a7a','#5a7a9a','#aacce8','#aaddff');
}
function drawGiselleIP(x,y){
  // 深灰色（圖一左二）
  drawCatIP(x,y,'#7a7a8a','#555566','#ccccdd','#334455','#445566','#9999aa','#aaaacc');
}

function drawStar(x,y,r,rot,hit){
  let c=hit?'#fff':'#ffee00',d=hit?'#777':'#996600',l='#fffff0';
  let R=Math.max(r,14);
  cx.save();cx.translate(snap(x),snap(y));cx.rotate(rot);
  for(let i=0;i<5;i++){
    let a=i*Math.PI*2/5-Math.PI/2;
    let tx=Math.cos(a)*R,ty=Math.sin(a)*R;
    cx.fillStyle='#aa7700';
    cx.fillRect(snap(tx-P*2.5),snap(ty-P*2.5),P*5,P*5);
  }
  for(let px2=-(R+P);px2<=R+P;px2+=P){
    for(let py2=-(R+P);py2<=R+P;py2+=P){
      let ang=Math.atan2(py2,px2);
      let dist=Math.sqrt(px2*px2+py2*py2);
      let sector=((ang+Math.PI/2)/(Math.PI*2)*5+2.5)%5;
      let frac=Math.abs((sector%1)-0.5)*2;
      let starR=R*(0.42+(1-0.42)*(1-frac));
      if(dist<=starR+P){
        let bright=dist<starR*0.5;
        cx.fillStyle=bright?l:c;
        cx.fillRect(snap(px2-P/2),snap(py2-P/2),P,P);
      }
    }
  }
  for(let i=0;i<5;i++){
    let a=i*Math.PI*2/5-Math.PI/2+Math.PI/5;
    let cx2=Math.cos(a)*R*0.42,cy2=Math.sin(a)*R*0.42;
    cx.fillStyle=d;cx.fillRect(snap(cx2-P),snap(cy2-P),P*2,P*2);
  }
  for(let i=0;i<5;i++){
    let a=i*Math.PI*2/5-Math.PI/2;
    let tx=Math.cos(a)*R,ty=Math.sin(a)*R;
    cx.fillStyle=c;cx.fillRect(snap(tx-P),snap(ty-P),P*2,P*2);
    if(i===0){cx.fillStyle=l;cx.fillRect(snap(tx-P),snap(ty-P),P,P);}
  }
  cx.fillStyle='#ffffff';
  let hx=Math.cos(-Math.PI/2)*R*0.3,hy=Math.sin(-Math.PI/2)*R*0.3;
  cx.fillRect(snap(hx-P),snap(hy-R*0.6),P*2,P*3);
  let by=R*0.82;
  cx.fillStyle=c;cx.fillRect(snap(-P*2),snap(by),P*4,P*3);
  cx.fillRect(snap(-P*1.5),snap(by+P*2),P*3,P*4);
  cx.fillStyle=d;cx.fillRect(snap(-P),snap(by+P*5),P*2,P*2);
  cx.fillStyle=d;cx.beginPath();cx.arc(0,snap(by+P*6+2),P*1.6,0,Math.PI*2);cx.fill();
  cx.fillStyle=c;cx.beginPath();cx.arc(0,snap(by+P*6+2),P*0.8,0,Math.PI*2);cx.fill();
  cx.restore();
}

function drawLemonSlice(x,y,isGold){
  // 顏色設定：綠色HP版 / 淡金黃超級版
  let skin = isGold?'#e8c840':'#88cc00';
  let flesh= isGold?'#f5e87a':'#bbee44';
  let pale = isGold?'#fdf5b0':'#ddff99';
  let seg  = isGold?'#c8a830':'#66aa00';
  let ctr  = isGold?'#fffde0':'#eeffcc';
  let R=10; // 切片半徑
  // 金色版：發光暈圈
  if(isGold){
    let glow=fr%16<8?0.55:0.35;
    cx.globalAlpha=glow;
    cx.fillStyle='#ffe066';
    cx.beginPath();cx.arc(snap(x),snap(y),R+5,0,Math.PI*2);cx.fill();
    cx.globalAlpha=1;
  }
  // 外皮（整圓）
  cx.fillStyle=skin;
  cx.beginPath();cx.arc(snap(x),snap(y),R,0,Math.PI*2);cx.fill();
  // 果肉（略小的圓）
  cx.fillStyle=flesh;
  cx.beginPath();cx.arc(snap(x),snap(y),R-2,0,Math.PI*2);cx.fill();
  // 8片果瓣（放射狀深色線）
  cx.strokeStyle=seg;cx.lineWidth=1;
  for(let i=0;i<8;i++){
    let a=i*Math.PI/4;
    cx.beginPath();
    cx.moveTo(snap(x),snap(y));
    cx.lineTo(snap(x+Math.cos(a)*(R-2)),snap(y+Math.sin(a)*(R-2)));
    cx.stroke();
  }
  // 中心白點
  cx.fillStyle=ctr;
  cx.beginPath();cx.arc(snap(x),snap(y),2,0,Math.PI*2);cx.fill();
  // 高光（左上）
  cx.fillStyle='rgba(255,255,255,0.7)';
  cx.beginPath();cx.arc(snap(x-3),snap(y-3),2,0,Math.PI*2);cx.fill();
  // 像素感外框
  pr(x-R,y-1,2,2,skin);pr(x+R-2,y-1,2,2,skin);
  pr(x-1,y-R,2,2,skin);pr(x-1,y+R-2,2,2,skin);
}

  let lvl;
  if(superMode>0){
    if(bulletLevel>=9) lvl=9; // 由外部觸發掃空
    else lvl=Math.min(9,bulletLevel+2);
  } else {
    lvl=bulletLevel;
  }
  // 子彈尺寸對照：
  // 小 big:false  w4 h10
  // 中 big:'mid'  w6 h14
  // 大 big:'large' w8 h18
  // 巨 big:'huge'  w11 h22
  // 雷射細 laser:true thick:false
  // 雷射粗 laser:true thick:true
  const sizes={0:'small',1:'small',2:'mid',3:'mid',4:'large',5:'large',6:'huge',7:'huge',8:'laser_thin',9:'laser_thick'};
  const counts={0:1,1:3,2:1,3:3,4:1,5:3,6:1,7:3,8:1,9:1};
  const sz=sizes[lvl]||'small';
  const ct=counts[lvl]||1;
  const isLaser=sz.startsWith('laser');
  const offsets=ct===1?[0]:ct===3?[-9,0,9]:[-9,0,9];
  const spds=ct===1?[sp]:ct===3?[sp,sp,sp-1]:[];
  for(let i=0;i<ct;i++){
    let ox=offsets[i], spd=sp-(i===0?0:1);
    let yoff=i===0?-20:(isLaser?-16:-14);
    bullets.push({x:ship.x+ox,y:ship.y+yoff,vx:nx*spd,vy:ny*spd,laser:isLaser,thick:sz==='laser_thick',bsize:sz});
  }
}

function spawnParticles(x,y,color,n){for(let i=0;i<n;i++){let a=Math.random()*Math.PI*2,sp=1+Math.random()*4;particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:30+(Math.random()*15|0),maxLife:45,color,coin:false});}}
function spawnCoin(x,y){particles.push({x,y,vx:(Math.random()-0.5)*2.5,vy:-2-Math.random()*3,life:75,maxLife:75,color:'#ffd700',coin:true});}
function getPos(e){const rc=cv.getBoundingClientRect(),sx=W/rc.width,sy=H/rc.height;if(e.touches)return{x:(e.touches[0].clientX-rc.left)*sx,y:(e.touches[0].clientY-rc.top)*sy};return{x:(e.clientX-rc.left)*sx,y:(e.clientY-rc.top)*sy};}
function checkBulletHit(obj,rad){let hit=false;bullets=bullets.filter(b=>{let dx=b.x-obj.x,dy=b.y-obj.y;if(Math.sqrt(dx*dx+dy*dy)<rad+5){hit=true;spawnParticles(b.x,b.y,'#ffff00',4);return b.laser;}return true;});return hit;}

// ── 連殺系統 ──────────────────────────────────────────────
const comboThresholds=[0,5,10,20,35,50]; // 達到幾連殺升一級倍率
const comboLabels=['','5 COMBO!','10 COMBO!!','20 COMBO!!!','35 COMBO!!!!','50 COMBO!!!!!'];
const comboColors=['','#ffff44','#ffaa00','#ff6600','#ff2200','#ff00ff'];
function addCombo(){
  combo++;
  comboTimer=180; // 3秒沒殺敵就歸零
  // 計算倍率：每達到門檻升一級（最高×6）
  let newMult=1;
  for(let i=comboThresholds.length-1;i>=0;i--){
    if(combo>=comboThresholds[i]){newMult=i+1;break;}
  }
  if(newMult>comboMult){
    comboMult=newMult;
    comboFlashMsg=comboLabels[comboMult-1]||('×'+comboMult+'!');
    comboFlashTimer=90;
  }
}
function resetCombo(){
  combo=0;comboMult=1;comboTimer=0;
}
function triggerFlash(text,color){eggFlash=text;eggFlashTimer=180;eggFlashColor=color||'#00ffaa';}
function triggerMsg(text,color){eggMsg=text;eggMsgTimer=220;eggMsgColor=color||'#00ffaa';}

function onEnemyKilled(type){
  // POS 擊殺累計
  if(!posReady){
    posKillCount++;
    if(posKillCount>=POS_KILL_NEEDED){posKillCount=0;posReady=true;}
  }
  // 計數各類型
  if(type==='heart'||type==='star'||type==='moon'||type==='butterfly') killCount[type]++;
  // 若四個都已解鎖，累計任意擊殺
  if(eggAllCollected&&!eggFinalDone){
    eggAnyKillAfter++;
    if(eggAnyKillAfter>=17){eggFinalDone=true;triggerFlash('We are the æspa','#ff88cc');}
  }
  // 個別解鎖檢查
  if(!eggUnlocked.heart&&killCount.heart>=411){eggUnlocked.heart=true;triggerMsg('Karina Rocket Puncher 🚀','#ff66aa');}
  if(!eggUnlocked.star&&killCount.star>=101){eggUnlocked.star=true;triggerMsg('Winter Armamenter ❄️','#aaddff');}
  if(!eggUnlocked.moon&&killCount.moon>=1030){eggUnlocked.moon=true;triggerMsg('Giselle Xenoglossy ✨','#ffdd88');}
  if(!eggUnlocked.butterfly&&killCount.butterfly>=1023){eggUnlocked.butterfly=true;triggerMsg('Ningning E.D Hacker 🦋','#dd88ff');}
  // 四個全解鎖
  if(!eggAllCollected&&eggUnlocked.heart&&eggUnlocked.star&&eggUnlocked.moon&&eggUnlocked.butterfly){
    eggAllCollected=true;eggAnyKillAfter=0;triggerMsg('全員集結！再擊殺17個...','#ffffff');
  }
}

function drawEggOverlay(){
  // 閃字
  if(eggFlashTimer>0){
    eggFlashTimer--;
    let alpha=eggFlashTimer>150?1:eggFlashTimer/150;
    let sz=eggFlashTimer>150?32:32+(150-eggFlashTimer)*0.15;
    cx.save();cx.globalAlpha=alpha;
    cx.font=`bold ${Math.round(sz)}px "Courier New"`;
    cx.textAlign='center';
    // "We are the æspa" 用水藍→淡粉紫漸層
    if(eggFlash==='We are the æspa'){
      let tw=cx.measureText(eggFlash).width;
      let grd=cx.createLinearGradient(W/2-tw/2,0,W/2+tw/2,0);
      grd.addColorStop(0,'#88ddff');   // 水藍
      grd.addColorStop(1,'#ddaaff');   // 淡粉紫
      cx.fillStyle=grd;
      // 陰影用雙色混合的中間色
      cx.shadowColor='#bbccff';cx.shadowBlur=24;
    } else {
      cx.fillStyle=eggFlashColor;
      cx.shadowColor=eggFlashColor;cx.shadowBlur=20;
    }
    cx.fillText(eggFlash,W/2,H/2);
    cx.shadowBlur=0;cx.restore();
  }
  // 小訊息（底部浮現）
  if(eggMsgTimer>0){
    eggMsgTimer--;
    let alpha=eggMsgTimer>180?1:eggMsgTimer/180;
    cx.save();cx.globalAlpha=alpha;
    cx.fillStyle='rgba(0,0,0,0.6)';
    cx.fillRect(0,H/2+60,W,36);
    cx.font='bold 13px "Courier New"';
    cx.fillStyle=eggMsgColor;
    cx.textAlign='center';
    cx.shadowColor=eggMsgColor;cx.shadowBlur=10;
    cx.fillText(eggMsg,W/2,H/2+83);
    cx.shadowBlur=0;cx.restore();
  }
}

const SHIP_MIN_Y=H/3,SHIP_MAX_Y=H-30;

function loop(){
  if(state!=='play')return;
  requestAnimationFrame(loop);
  fr++;
  if(shakeTimer>0){cx.save();cx.translate((Math.random()-0.5)*4,(Math.random()-0.5)*4);shakeTimer--;}
  if(superMode>0) superMode--;
  // 掃空模式處理
  if(sweepMode>0){
    sweepMode--;
    // 每60幀清場一次（共3次）
    if(sweepMode%60===0&&sweepCount>0){
      sweepCount--;
      // 清除所有小怪（加分）
      enemies.forEach(e=>{spawnParticles(e.x,e.y,'#ff4444',10);score+=e.type==='snake'?25:12;onEnemyKilled(e.type);});
      enemies=[];
      shakeTimer=8;
    }
    // 全畫面紅光掃描線
    if(fr%4<2){
      cx.fillStyle='rgba(255,50,50,0.08)';cx.fillRect(0,0,W,H);
      cx.strokeStyle='rgba(255,80,80,0.6)';cx.lineWidth=2;
      let scanY=(fr*8)%H;
      cx.beginPath();cx.moveTo(0,scanY);cx.lineTo(W,scanY);cx.stroke();
    }
  }
  cx.fillStyle='#000010';cx.fillRect(0,0,W,H);
  stars.forEach(s=>{s.y+=s.sp;if(s.y>H)s.y=0;cx.fillStyle=(fr+s.ph)%26<13?'#ffffff':'#3333aa';cx.fillRect(snap(s.x),snap(s.y),s.s*P,s.s*P);});

  // 檸檬王：200分第一次，之後每滿300分出現一次
  let lemonThresh=score<200?0:(200+Math.floor((score-200)/300)*300);
  if(lemonThresh>0&&lemonThresh>lastLemonThreshold&&!lemonBossActive){
    lastLemonThreshold=lemonThresh;spawnLemonBoss();
  }
  // 黑曼巴：每滿2000分出現一次
  let mambaThresh=Math.floor(score/2000)*2000;
  if(mambaThresh>0&&mambaThresh>lastMambaThreshold&&!mambaActive){
    lastMambaThreshold=mambaThresh;spawnMamba();
  }
  // 小怪持續生成（不再受黑曼巴影響）
  spawnTimer++;if(spawnTimer>=spawnIv){spawnEnemy();spawnTimer=0;if(fr>400)spawnIv=Math.max(38,spawnIv-1);}

  ship.x+=(ship.tx-ship.x)*0.14;ship.y+=(ship.ty-ship.y)*0.14;
  ship.x=Math.max(22,Math.min(W-22,ship.x));
  ship.y=Math.max(SHIP_MIN_Y,Math.min(SHIP_MAX_Y,ship.y));

  bullets=bullets.filter(b=>{b.x+=b.vx;b.y+=b.vy;return b.y>-20&&b.y<H+10&&b.x>-10&&b.x<W+10;});
  bullets.forEach(b=>drawChallengeBullet(b));

  if(lemonBoss){
    let lb=lemonBoss;
    lb.x+=(lb.tx-lb.x)*0.018;if(Math.abs(lb.x-lb.tx)<10)lb.tx=30+Math.random()*(W-60);
    lb.y=Math.min(90,lb.y+0.9);lb.shootTimer++;
    if(lb.shootTimer>110){
      lb.shootTimer=0;
      let ang=Math.atan2(ship.y-lb.y,ship.x-lb.x);
      bossBullets.push({x:lb.x,y:lb.y+lb.r,vx:Math.cos(ang)*1.8,vy:Math.sin(ang)*1.8,type:'lemon',r:10,life:220,big:true});
    }
    if(lb.hit>0)lb.hit--;
    let dmg=checkBulletHit(lb,lb.r);
    if(dmg){lb.hp--;lb.hit=8;shakeTimer=4;
      if(lb.hp<=0){
        spawnParticles(lb.x,lb.y,'#f5e000',30);
        powerups.push({x:lb.x-15,y:lb.y,vy:1.4,type:'hp'});
        if(Math.random()<0.05)powerups.push({x:lb.x+15,y:lb.y,vy:1.4,type:'super'});
        score+=150;lemonBoss=null;lemonBossActive=false;
      }
    } else drawLemonBoss(lb);
  }

  if(mamba){
    let mb=mamba;
    mb.x+=mb.vx;if(mb.x<mb.r+10||mb.x>W-mb.r-10)mb.vx*=-1;
    mb.y=Math.min(110,mb.y+0.8);mb.angle+=0.04;mb.shootTimer++;
    if(mb.shootTimer>35){mb.shootTimer=0;let ang=Math.atan2(ship.y-mb.y,ship.x-mb.x);bossBullets.push({x:mb.x,y:mb.y+mb.r,vx:Math.cos(ang)*2.8+Math.sin(fr*0.1)*0.8,vy:Math.sin(ang)*2.8+0.5,type:'slime',r:7,life:180});}
    if(mb.hit>0)mb.hit--;
    let dmg=checkBulletHit(mb,mb.r);
    if(dmg){mb.hp--;mb.hit=8;shakeTimer=6;if(mb.hp<=0){spawnParticles(mb.x,mb.y,'#aa00ff',40);powerups.push({x:mb.x-15,y:mb.y,vy:1.4,type:'hp'});if(Math.random()<0.05)powerups.push({x:mb.x+15,y:mb.y,vy:1.4,type:'super'});score+=300;mamba=null;mambaActive=false;}}
    else drawMambaHead(mb);
  }

  bossBullets=bossBullets.filter(b=>{
    b.x+=b.vx;b.y+=b.vy;b.vy+=0.03;b.life--;
    if(b.type==='lemon'){
      if(b.big){pr(b.x-9,b.y-11,18,22,'#f5e000');pr(b.x-7,b.y-14,14,6,'#f5e000');pr(b.x-6,b.y-9,12,16,'#ffff88');pr(b.x-4,b.y-11,8,4,'#ffffff');}
      else{pr(b.x-5,b.y-6,10,12,'#f5e000');pr(b.x-3,b.y-8,6,4,'#f5e000');pr(b.x-3,b.y-5,6,8,'#ffff88');}
    } else {
      pr(b.x-b.r,b.y-b.r,b.r*2,b.r*2,'#1a0a2e');pr(b.x-b.r+2,b.y-b.r+2,b.r*2-4,b.r*2-4,'#2d1155');pr(b.x-2,b.y-2,4,4,'#8800ff');
    }
    if(superMode<=0&&sweepMode<=0){let dx=b.x-ship.x,dy=b.y-ship.y;if(Math.sqrt(dx*dx+dy*dy)<b.r+14){lives--;resetCombo();spawnParticles(ship.x,ship.y,'#00ff88',10);if(lives<=0){endGame();return false;}return false;}}
    return b.life>0&&b.y<H+20;
  });

  enemies=enemies.filter(e=>{
    e.x+=e.vx;e.y+=e.vy;if(e.x<e.r||e.x>W-e.r)e.vx*=-1;
    e.rot+=e.rotSpeed;if(e.hit>0)e.hit--;
    if(e.y>H+40){if(superMode<=0&&sweepMode<=0){lives--;resetCombo();if(lives<=0){endGame();return false;}}return false;}
    let dead=false;
    bullets=bullets.filter(b=>{
      if(dead)return true;
      let dx=b.x-e.x,dy=b.y-e.y;
      if(Math.sqrt(dx*dx+dy*dy)<e.r+5){
        e.hp--;e.hit=8;
        spawnParticles(b.x,b.y,e.type==='snake'?'#8800ff':e.type==='heart'?'#5599ff':e.type==='butterfly'?'#9933ff':'#ffdd00',4);
        if(e.hp<=0){
          spawnParticles(e.x,e.y,e.type==='snake'?'#8800ff':'#ffaa00',14);
          powerups.push({x:e.x,y:e.y,vy:1.5,type:'bullet'});
          let baseScore=e.type==='snake'?25:12;
          score+=baseScore*comboMult;
          addCombo();
          onEnemyKilled(e.type);
          dead=true;
        }
        return b.laser;
      }
      return true;
    });
    if(dead)return false;
    if(superMode<=0&&sweepMode<=0){let cdx=e.x-ship.x,cdy=e.y-ship.y;if(Math.sqrt(cdx*cdx+cdy*cdy)<e.r+16){lives--;resetCombo();spawnParticles(ship.x,ship.y,'#00ff88',10);if(lives<=0){endGame();return false;}return false;}}
    if(e.type==='snake')drawSnake(e.x,e.y,e.rot,e.r,e.hit>0);
    else if(e.type==='heart')drawHeart(e.x,e.y,e.r,e.hit>0);
    else if(e.type==='moon')drawMoon(e.x,e.y,e.r,e.rot,e.hit>0);
    else if(e.type==='star')drawStar(e.x,e.y,e.r,e.rot,e.hit>0);
    else if(e.type==='butterfly')drawButterfly(e.x,e.y,e.r,e.rot,e.hit>0);
    else if(e.type==='dragonfly')drawDragonfly(e.x,e.y,e.rot,e.r,e.hit>0);
    else if(e.type==='yam')drawYam(e.x,e.y,e.r,e.hit>0);
    else if(e.type==='note')drawNote(e.x,e.y,e.r,e.rot,e.hit>0);
    else if(e.type==='aespo')drawAespo(e.x,e.y,e.r,e.hit>0);
    else if(e.type==='mini_lemon')drawMiniLemon(e.x,e.y,e.r,e.hit>0);
    else if(e.type==='sm_building')drawSMBuilding(e.x,e.y,e.r,e.hit>0);
    if(e.maxHp>1){pr(e.x-e.r,e.y+e.r+22,e.r*2,3,'#330000');pr(e.x-e.r,e.y+e.r+22,e.r*2*(e.hp/e.maxHp),3,'#00ff44');}
    return true;
  });

  powerups=powerups.filter(p=>{
    p.y+=p.vy;
    // bullet 增強劑：自動收集，不需靠近
    if(p.type==='bullet'){
      if(bulletLevel<9){
        bulletExp++;
        if(bulletExp>=(bulletExpNeeded[bulletLevel]||5)){
          bulletExp=0; bulletLevel++;
          spawnParticles(p.x,p.y,'#00ffcc',16);
        } else {
          spawnParticles(p.x,p.y,'#00ff88',4);
        }
      }
      return false;
    }
    drawPickup(p);
    let dx=p.x-ship.x,dy=p.y-ship.y;
    if(Math.sqrt(dx*dx+dy*dy)<22){
      if(p.type==='hp'){lives=Math.min(9,lives+1);spawnParticles(ship.x,ship.y,'#00ff44',12);}
      else if(p.type==='super'){
        if(bulletLevel>=9){
          sweepMode=180; sweepCount=3;
          spawnParticles(ship.x,ship.y,'#ff4444',24);
        } else {
          superMode=600;
          spawnParticles(ship.x,ship.y,'#ffff00',20);
        }
      }
      return false;
    }
    return p.y<H+20;
  });

  particles=particles.filter(p=>{
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.06;p.life--;
    if(p.coin){if(Math.abs(p.x-ship.x)<20&&Math.abs(p.y-ship.y)<20){coins++;return false;}pr(p.x-3,p.y-3,6,6,'#ffd700');pr(p.x-1,p.y-1,3,3,'#fff');}
    else if(p.life>0){cx.globalAlpha=p.life/p.maxLife;cx.fillStyle=p.color;cx.fillRect(snap(p.x-2),snap(p.y-2),P*2,P*2);cx.globalAlpha=1;}
    return p.life>0;
  });

  // ── 連殺計時器 ──
  if(comboTimer>0){
    comboTimer--;
    if(comboTimer===0) resetCombo();
  }
  // ── 連殺閃字 ──
  if(comboFlashTimer>0){
    comboFlashTimer--;
    let alpha=comboFlashTimer>60?1:comboFlashTimer/60;
    let col=comboColors[comboMult-1]||'#ffff00';
    cx.save();cx.globalAlpha=alpha;
    cx.font=`bold ${18+comboMult*2}px "Courier New"`;
    cx.fillStyle=col;cx.textAlign='center';
    cx.shadowColor=col;cx.shadowBlur=14;
    cx.fillText(comboFlashMsg,W/2,H/2-20);
    cx.shadowBlur=0;cx.restore();
  }
  // ── 51分彩蛋 ──
  if(!eggScore51Done&&score>50){eggScore51Done=true;triggerFlash('aerea51tw','#00ffcc');}

  // ── 飛到頂端彩蛋 ──
  if(ship.y<=SHIP_MIN_Y+4){
    topEdgeTimer++;
    if(topEdgeTimer>120&&!topEggDone){topEggDone=true;triggerMsg('你發現隱藏訊息！AEREA51TW 永遠支持 aespa 🛸','#ff88ff');}
  } else {topEdgeTimer=0;}

  // ── 秘密模式：開始畫面點外星人6下觸發，讓子彈顏色變彩虹 ──

  if(sweepMode>0&&fr%6<3){cx.strokeStyle='rgba(255,50,50,0.6)';cx.lineWidth=4;cx.strokeRect(2,30,W-4,H-32);}
  else if(superMode>0&&fr%6<3){cx.strokeStyle='rgba(255,255,0,0.5)';cx.lineWidth=3;cx.strokeRect(2,30,W-4,H-32);}
  if(secretModeActive&&fr%6<3){cx.strokeStyle='rgba(255,100,255,0.4)';cx.lineWidth=2;cx.strokeRect(4,32,W-8,H-36);}

  // ── 自動射擊 ──
  if(autoFireOn){
    autoFireTimer++;
    if(autoFireTimer>=AUTO_FIRE_INTERVAL){
      autoFireTimer=0;
      // 朝最近的敵人射擊，沒有敵人就朝正上方
      let target=null,minD=99999;
      enemies.forEach(e=>{let d=Math.abs(e.x-ship.x)+(e.y-ship.y)*0.5;if(d<minD&&e.y>0){minD=d;target=e;}});
      if(lemonBoss)target={x:lemonBoss.x,y:lemonBoss.y};
      if(mamba)target={x:mamba.x,y:mamba.y};
      fireAt(target?target.x:ship.x,target?target.y:ship.y-200);
    }
    // 自動射擊時角色閃爍指示燈
    if(fr%8<4){pr(ship.x-18,ship.y,4,4,'#00ff88');}
  }

  // ── POS 特效 ──
  if(posActive){
    posTimer--;
    if(posTimer<=0)posActive=false;
    let alpha=(posTimer/90)*0.5;
    cx.globalAlpha=alpha;
    // 波紋擴散效果
    let radius=(1-posTimer/90)*W*0.8;
    cx.strokeStyle='#ff44ff';cx.lineWidth=4;
    cx.beginPath();cx.arc(snap(ship.x),snap(ship.y),radius,0,Math.PI*2);cx.stroke();
    cx.strokeStyle='#ffffff';cx.lineWidth=2;
    cx.beginPath();cx.arc(snap(ship.x),snap(ship.y),radius*0.6,0,Math.PI*2);cx.stroke();
    cx.globalAlpha=1;
    // P.O.S 大字閃現
    if(posTimer>60){
      cx.font='bold 32px "Courier New"';cx.fillStyle='#ff44ff';
      cx.textAlign='center';cx.shadowColor='#ff44ff';cx.shadowBlur=20;
      cx.fillText('P.O.S',W/2,H/2);
      cx.shadowBlur=0;cx.textAlign='left';
    }
  }

  let ef=fr%10<5;
  pr(ship.x-3,ship.y+16,6,ef?8:6,secretModeActive?`hsl(${fr*6%360},100%,60%)`:'#00ff88');
  pr(ship.x-2,ship.y+16,4,ef?6:4,'#aaffcc');
  drawUFO(ship.x,ship.y);

  for(let i=0;i<Math.min(lives,9);i++)pr(W-12-i*14,H-18,10,10,'#ff4488');

  // ── POS 按鈕（右下角）──
  let posX=W-68,posY=H-52,posW=60,posH=28;
  if(posReady){
    // 充能完成：閃爍粉紫
    let pulse=fr%16<8;
    cx.fillStyle=pulse?'#ff44ff':'#cc22cc';
    cx.fillRect(posX,posY,posW,posH);
    cx.strokeStyle='#ffffff';cx.lineWidth=2;cx.strokeRect(posX,posY,posW,posH);
    cx.font='bold 11px "Courier New"';cx.fillStyle='#fff';cx.textAlign='center';
    cx.fillText('P.O.S',posX+posW/2,posY+18);cx.textAlign='left';
  } else {
    // 進度條
    cx.fillStyle='rgba(0,0,0,0.5)';cx.fillRect(posX,posY,posW,posH);
    cx.strokeStyle='#664466';cx.lineWidth=1;cx.strokeRect(posX,posY,posW,posH);
    let pct=posKillCount/POS_KILL_NEEDED;
    cx.fillStyle='#882288';cx.fillRect(posX+2,posY+2,Math.round((posW-4)*pct),posH-4);
    cx.font='bold 9px "Courier New"';cx.fillStyle='#aa88aa';cx.textAlign='center';
    cx.fillText('P.O.S '+posKillCount+'/15',posX+posW/2,posY+16);cx.textAlign='left';
  }

  if(shakeTimer>0)cx.restore();
  hud();
  drawEggOverlay();
}

function updateBestDisplay(){
  bestScore=parseInt(localStorage.getItem('aerea51tw_best')||'0');
  const el=document.getElementById('bestDisp');
  if(el)el.textContent='最佳紀錄：'+bestScore;
}

function endGame(){
  state='idle';
  if(challengeMode&&todayChallenge){
    saveChallengeRecord(todayChallenge.id,score);
    const chBest=getChallengeRecord(todayChallenge.id)||0;
    let extraMsg='';
    if(score>=10000) extraMsg='<div style="font-size:11px;color:#00ffcc;margin-top:6px;font-family:\'Courier New\',monospace">恭喜你並不是遊戲黑洞，跟aespa擁有非常大的區別 😂🎉</div>';
    else if(score<200) extraMsg='<div style="font-size:11px;color:#ff88aa;margin-top:6px;font-family:\'Courier New\',monospace">難道...你是aespa派來的遊戲黑洞?? 🕳️👾</div>';
    showMainMenu(`${todayChallenge.emoji} 挑戰結束！<br>本次：${score} pts ／ 最佳：${chBest} pts${extraMsg}`);
  } else {
    if(score>bestScore){bestScore=score;localStorage.setItem('aerea51tw_best',bestScore);}
    let extraMsg='';
    if(score>=10000) extraMsg='<div style="font-size:11px;color:#00ffcc;margin-top:6px;font-family:\'Courier New\',monospace">恭喜你並不是遊戲黑洞，跟aespa擁有非常大的區別 😂🎉</div>';
    else if(score<200) extraMsg='<div style="font-size:11px;color:#ff88aa;margin-top:6px;font-family:\'Courier New\',monospace">難道...你是aespa派來的遊戲黑洞?? 🕳️👾</div>';
    showMainMenu(`本次分數：${score}${extraMsg}`);
  }
}

// ── 頁面導航 ──────────────────────────────────────────────
function showMainMenu(extraHtml=''){
  challengeMode=false;
  todayChallenge=getTodayChallenge();
  const ov=document.getElementById('ov');
  const isRest=todayChallenge.id==='rest';
  const todayLabel=isRest?'📅 今日：公休日':`${todayChallenge.emoji} 今日：${todayChallenge.name}`;
  ov.innerHTML=`
    <h2>★ ALIEN BLASTER ★</h2>
    <div class="a51" id="a51tag" style="cursor:pointer;user-select:none">${secretModeEverActive?'🛸 SECRET MODE ON 🛸':'AEREA51TW'}</div>
    <div class="best" id="bestDisp">最佳紀錄：${bestScore}</div>
    ${extraHtml?`<div class="sub" style="margin-bottom:10px;font-size:11px">${extraHtml}</div>`:''}

  document.getElementById('btnChallenge').onclick=()=>showChallengeSelect();

}

function showChallengeSelect(){

  let btns=allOptions.map(d=>`
    <button class="ov-btn" style="width:300px;padding:9px 0;font-size:12px;letter-spacing:1px;margin-bottom:5px" data-id="${d.id}">
      ${d.emoji} ${d.name}
    </button>`).join('');
  ov.innerHTML=`
    <div style="font-family:'Courier New',monospace;text-align:center;color:#00ff88;font-size:13px;letter-spacing:2px;margin-bottom:12px">⚡ 選擇挑戰模式</div>
    ${btns}
    <button id="btnBack0" class="ov-btn rec" style="width:300px;margin-top:4px">← 返回</button>`;
  ov.style.display='flex';
  allOptions.forEach(d=>{
    ov.querySelector(`[data-id="${d.id}"]`).onclick=()=>showChallengeInfo(d);
  });
  document.getElementById('btnBack0').onclick=()=>showMainMenu();
}

function showChallengeInfo(dayOverride){
  const day=dayOverride||getTodayChallenge();

  if(day.id==='rest'){
    ov.innerHTML=`
      <div class="rest-page">
        <div class="rest-body">> AEREA51TW SYSTEM LOG\n> DATE : [REDACTED]\n> STATUS : ████████ ERROR\n\n⚠️ 外星人今日接受秘密任務中\n   挑戰系統臨時離線\n\n[ REASON  ] : ae 心情不好\n[ ETA     ] : 不確定\n[ SORRY?  ] : 有一點點\n\n> 嘗試重新連線中........\n> 連線失敗\n> 連線失敗\n> 連線失敗\n> 算了\n\n-- AEREA51TW / 造成困擾深感抱歉 --\n   ( 其實沒有很抱歉 )</div>
        <div style="margin-top:12px;text-align:center"><button id="btnBack" class="ov-btn rec">← 返回</button></div>
      </div>`;
    ov.style.display='flex';
    document.getElementById('btnBack').onclick=()=>showMainMenu();

  }
  const bgMap={
    karina:  {bg:'rgba(100,160,255,0.10)',border:'rgba(100,160,255,0.35)',text:'#aaccff'},
    giselle: {bg:'rgba(255,150,180,0.10)',border:'rgba(255,150,180,0.35)',text:'#ffaabb'},
    winter:  {bg:'rgba(230,240,255,0.12)',border:'rgba(200,220,255,0.45)',text:'#cce0ff'},
    ningning:{bg:'rgba(180,100,255,0.10)',border:'rgba(180,100,255,0.35)',text:'#cc99ff'},
    ae:      {bg:'rgba(255,100,100,0.08)',border:'rgba(255,100,100,0.3)', text:'#ff9999',rainbow:true},
    lemon:   {bg:'rgba(255,220,50,0.10)', border:'rgba(255,220,50,0.35)', text:'#ffdd88'},
    kwangya: {bg:'rgba(255,120,30,0.10)', border:'rgba(255,120,30,0.35)', text:'#ff9955'},
  };
  const bc=bgMap[day.id]||{bg:'rgba(0,255,136,0.05)',border:'rgba(0,255,136,0.25)',text:'#88ffaa'};

  if(bc.rainbow){
    bodyStyle=`background:linear-gradient(135deg,rgba(255,80,80,0.08),rgba(255,200,0,0.08),rgba(0,255,100,0.08),rgba(0,150,255,0.08),rgba(180,0,255,0.08));border:1px solid rgba(255,180,255,0.4);color:#ddbbff`;
  }
  const noDate=['無特定事件','一個月出現一次'];
  const showDate=!noDate.includes(day.date);
  ov.innerHTML=`
    <div class="challenge-page">
      <div class="challenge-emoji">${day.emoji}</div>
      <div class="challenge-title" style="color:${bc.text}">${day.name}</div>
      ${showDate?`<div class="challenge-date" style="color:#ffffff">${day.date}</div>`:''}
      <div class="challenge-body" style="${bodyStyle};text-align:center">${day.body}</div>
      <div class="challenge-hud" style="color:#ffffff">HUD 口號：${day.hud}</div>
      <div style="display:flex;gap:8px;justify-content:center">
        <button id="btnStartChallenge" class="ov-btn today" style="width:180px;padding:11px 0">⚡ 開始挑戰</button>
        <button id="btnBack2" class="ov-btn rec" style="width:80px;padding:11px 0">← 返回</button>
      </div>
    </div>`;
  ov.style.display='flex';
  document.getElementById('btnStartChallenge').onclick=()=>{
    todayChallenge=day;
    challengeMode=true;
    secretModeActive=false; // 今日挑戰不適用秘密模式
    startGame();
  };
  document.getElementById('btnBack2').onclick=()=>showMainMenu();
}

function showRecords(){
  const ov=document.getElementById('ov');
  let rows='';
  const allDays=[...CHALLENGE_DAYS,{id:'kwangya',name:'Beat KWANGYA'}];
  const ids=['karina','giselle','winter','ningning','ae','lemon','kwangya'];
  const names={"karina":"Karina's Day","giselle":"Giselle's Day","winter":"Winter's Day","ningning":"Ningning's Day","ae":"Be my æ Day","lemon":"Lemon Day~","kwangya":"Beat KWANGYA"};
  ids.forEach(id=>{
    const rec=getChallengeRecord(id);
    if(rec===null){
      rows+=`<div class="record-row"><span class="record-locked">尚無查閱權限</span><span class="record-zero">---- pts</span></div>`;
    } else if(rec===0){
      rows+=`<div class="record-row"><span class="record-name">${names[id]}</span><span class="record-zero">尚未留下紀錄</span></div>`;
    } else {
      rows+=`<div class="record-row"><span class="record-name">${names[id]}</span><span class="record-score">${rec} pts</span></div>`;
    }
  });
  ov.innerHTML=`
    <div class="record-page">
      <div class="record-title">📊 AEREA51TW 戰績紀錄</div>
      <div class="record-section">── 一般模式 ──</div>
      <div class="record-row"><span class="record-name">最佳紀錄</span><span class="record-score">${bestScore} pts</span></div>
      <div class="record-section" style="margin-top:14px">── 挑戰日紀錄 ──</div>
      ${rows}
      <div style="margin-top:16px"><button id="btnBack3" class="ov-btn rec" style="width:100%;padding:13px 0">← 返回</button></div>
    </div>`;
  ov.style.display='flex';
  document.getElementById('btnBack3').onclick=()=>showMainMenu();
}

function startGame(){document.getElementById('ov').style.display='none';initGame();state='play';requestAnimationFrame(loop);}
function setupA51Click(){
  const a51el=document.getElementById('a51tag');
  if(!a51el||secretModeEverActive)return;
  let clickTimer=null;
  a51el.addEventListener('click',function handler(e){
    if(state!=='idle')return;
    e.stopPropagation();
    alienClickCount++;
    a51el.style.background='#00ff88';a51el.style.color='#002211';
    setTimeout(()=>{a51el.style.background='#00aa44';a51el.style.color='#fff';},120);
    a51el.title=`${alienClickCount}/6`;
    if(clickTimer)clearTimeout(clickTimer);
    clickTimer=setTimeout(()=>{alienClickCount=0;a51el.title='';},3000);
    if(alienClickCount>=6){
      clearTimeout(clickTimer);alienClickCount=0;a51el.title='';
      secretModeActive=true;secretModeEverActive=true;
      a51el.style.background='linear-gradient(90deg,#88ddff,#ddaaff)';
      a51el.style.color='#000';a51el.textContent='🛸 SECRET MODE ON 🛸';
      a51el.removeEventListener('click',handler);
      const msg=document.createElement('div');
      msg.style.cssText='font-size:11px;color:#ff88ff;font-family:"Courier New",monospace;margin-top:8px;text-align:center';
      msg.textContent='隱藏模式已啟動！子彈變彩虹色 ✨';
      a51el.parentNode.insertBefore(msg,a51el.nextSibling);
      setTimeout(()=>{if(msg.parentNode)msg.parentNode.removeChild(msg);},4000);
    }
  });
}

cv.addEventListener('mousedown',e=>{if(state!=='play')return;dragStart=getPos(e);touchMoved=false;});
cv.addEventListener('mousemove',e=>{if(!dragStart||state!=='play')return;let p=getPos(e),dx=p.x-dragStart.x,dy=p.y-dragStart.y;if(Math.abs(dx)>3||Math.abs(dy)>3)touchMoved=true;ship.tx+=dx;ship.ty+=dy;dragStart=p;});
cv.addEventListener('mouseup',e=>{
  if(state!=='play')return;
  let p=getPos(e);
  if(!touchMoved&&dragStart){
    if(posReady&&p.x>W-80&&p.y>H-55){
      triggerPOS();
    } else {
      autoFireOn=!autoFireOn;
    }
  }
  dragStart=null;touchMoved=false;
});
cv.addEventListener('touchstart',e=>{e.preventDefault();if(state!=='play')return;dragStart=getPos(e);touchMoved=false;},{passive:false});
cv.addEventListener('touchmove',e=>{e.preventDefault();if(!dragStart||state!=='play')return;let p=getPos(e),dx=p.x-dragStart.x,dy=p.y-dragStart.y;if(Math.abs(dx)>4||Math.abs(dy)>4)touchMoved=true;ship.tx+=dx;ship.ty+=dy;dragStart=p;},{passive:false});
cv.addEventListener('touchend',e=>{
  e.preventDefault();if(state!=='play')return;
  if(!touchMoved&&dragStart){
    let rc=cv.getBoundingClientRect(),t=e.changedTouches[0];
    let px=(t.clientX-rc.left)*(W/rc.width),py=(t.clientY-rc.top)*(H/rc.height);
    if(posReady&&px>W-80&&py>H-55){
      triggerPOS();
    } else {
      autoFireOn=!autoFireOn;
    }
  }
  dragStart=null;touchMoved=false;
},{passive:false});

// 初始化
bestScore=parseInt(localStorage.getItem('aerea51tw_best')||'0');
initGame();
cx.fillStyle='#000010';cx.fillRect(0,0,W,H);
stars.forEach(s=>{cx.fillStyle='#aaaaee';cx.fillRect(snap(s.x),snap(s.y),s.s*P,s.s*P);});
drawUFO(W/2,H-80);
showMainMenu();
</script>
